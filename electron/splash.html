<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATrupole Loading</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #0f172a;
      --bg-bottom: #111827;
      --panel-border: rgba(148, 163, 184, 0.18);
      --text-primary: #f8fafc;
      --text-secondary: rgba(226, 232, 240, 0.74);
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.2);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: var(--font);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 48%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-primary);
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .shell {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .card {
      width: 100%;
      height: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(17, 24, 39, 0.94));
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    .eyebrow {
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .title {
      font-size: 28px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 5px solid rgba(148, 163, 184, 0.18);
      border-top-color: var(--accent);
      border-right-color: rgba(125, 211, 252, 0.55);
      box-shadow: 0 0 0 8px var(--accent-soft);
      animation: spin 0.9s linear infinite;
    }

    .status {
      max-width: 240px;
      line-height: 1.5;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .version {
      font-size: 12px;
      color: rgba(148, 163, 184, 0.78);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="card">
      <div class="eyebrow">Preparing Workspace</div>
      <div class="title">CATrupole</div>
      <div class="spinner" aria-hidden="true"></div>
      <div class="status">Starting the backend and loading your analysis window...</div>
      <div id="version" class="version"></div>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawVersion = String(params.get("appVersion") || "").trim();
    if (rawVersion) {
      document.getElementById("version").textContent = rawVersion.startsWith("v")
        ? rawVersion
        : `v${rawVersion}`;
    }
  </script>
</body>
</html>
